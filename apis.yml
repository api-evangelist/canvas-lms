    type: Authentication
    name: Live Events JWKS (Signed HTTPS Webhook Verification)
  - url: openapi/canvas-lms-live-events-asyncapi.yml
    type: AsyncAPI
  description: Canvas Live Events stream lifecycle events emitted by Canvas (course, enrollment,
    assignment, submission, grade change, discussion, module, outcome, file/attachment,
    SIS batch, conversation, quiz, wiki page, LTI resource link, login, asset access, and more)
    to subscribed destinations. Customers subscribe via Canvas Data Services and choose a delivery
    method — AWS SQS (standard queue named beginning with `canvas-live-events`, granted to Canvas
    AWS account 636161780776, optional IAM key/secret/region) or an HTTPS webhook (POSTs the event
    JSON, or a signed JWT whose signing keys rotate monthly and are advertised at the Canvas JWKS
    endpoint). Two payload formats are supported — Canvas JSON and Caliper IMS. Failed HTTPS
    deliveries are retried up to three times with exponential backoff over ~10–20 minutes; sustained
    failure deactivates the subscription. Live Events are designed for analytics and data collection
    workflows, not for use cases requiring strictly up-to-date data.
