- type: Features
  data:
  - Open-source AGPLv3 LMS by Instructure with 6,600+ GitHub stars and 30M+ users worldwide
  - REST API with 190+ resource groups covering the full LMS surface — courses, users, enrollments,
    assignments, submissions, grades, outcomes, quizzes, modules, pages, discussions, files,
    conversations, calendar events, audit logs, AI conversations, AI experiences, and more
  - GraphQL API at /api/graphql with hosted GraphiQL explorer at /graphiql
  - OAuth2 (RFC 6749) authentication with developer-key-issued client credentials, manual personal
    access tokens for testing, and the as_user_id masquerading parameter for admin act-as flows
  - Full IMS LTI 1.3 / LTI Advantage implementation — Deep Linking 2.0, Names and Role Provisioning,
    Assignment & Grade Services (Line Items, Score, Result), Dynamic Registration, JWK key exchange
  - Platform Notification Service (PNS) for server-to-server webhook delivery to LTI tools
  - Plagiarism Detection Platform with webhook subscriptions, originality reports, and
    plagiarism-platform users/assignments
  - SIS Import API with the canonical Canvas SIS CSV format covering accounts, terms, courses,
    sections, users, enrollments, groups, group memberships, cross-listings, logins, admins
  - Data Access Platform (DAP / Canvas Data 2) for warehouse-scale snapshot + incremental table and
    event exports via the api-gateway.instructure.com/dap endpoint
  - Built-in OpenAPI 3.0 generator via the `rake doc:openapi` task using swagger_yard
  - Pagination using RFC 5988 Link headers; per_page query parameter; supports `last`, `next`,
    `prev`, and `first` link rels
  - Per-user-per-host throttling with X-Request-Cost and X-Rate-Limit-Remaining response headers
  - Compound documents and includes[] query parameter for relationship hydration
  - File Upload API with multipart POST-then-PUT flow for direct-to-S3 uploads
  - Audit log APIs for Authentications, Course changes, and Grade Changes
  - Canvas Studio (video), Canvas Catalog (course discovery + commerce), Canvas Credentials
    (digital credentials via Parchment), and Canvas Career Experiences
  - Cross-platform mobile apps for Students, Teachers, Parents (canvas-ios + canvas-android repos)
  - Common Cartridge import/export, QTI 1.x/2.x quiz interchange, Moodle migration
  - Self-hosted via Docker (canvas-self-hosted) or hosted as Canvas Cloud (Canvas Free for
    Teacher, Canvas LMS for institutions)
  - Owned by Instructure, Inc. (KKR portfolio company since 2024); Steve Daly, CEO
