description: Canvas is the open, AGPLv3-licensed learning management system created and maintained by
  Instructure, Inc. and used by more than 30 million students, teachers, and administrators across higher
  education, K-12, business, and government. Canvas exposes a deep REST API (190+ resource groups covering
  Accounts, Courses, Enrollments, Assignments, Submissions, Grades, Outcomes, Quizzes, Rubrics, Modules,
  Pages, Discussions, Files, Conversations, Calendar Events, SIS Import, Authentication Providers,
  Developer Keys, External Tools, AI Conversations, AI Experiences, Analytics, Audit Logs, and more), a
  GraphQL API at /api/graphql, IMS LTI 1.3 / LTI Advantage services (Names and Role Provisioning, Line
  Items, Score, Result, Deep Linking), a Platform Notification Service for server-to-server webhook
  delivery, and the Data Access Platform (DAP / Canvas Data 2) for warehouse-scale event and snapshot
  data export. Canvas is the same software that powers canvas.instructure.com (Free for Teacher), Canvas
  Cloud for institutions, and self-hosted deployments.
