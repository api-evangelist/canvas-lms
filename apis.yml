  description: The canonical Canvas REST API at /api/v1. 190+ controller-driven resource groups covering
    Accounts, Account Calendars, Account Notifications, Account Reports, Admins, Announcements,
    Appointment Groups, Assignments, Assignment Groups, Assignment Extensions, Authentication Providers,
    Audit Logs (Authentications, Course, Grade Change), Blueprint Courses, Bookmarks, Brand Configs,
    Calendar Events, Collaborations, Communication Channels, Conferences, Content Exports, Content
    Migrations, Content Shares, Conversations, Courses, Course Pace, Course Reports, Custom Gradebook
    Columns, Developer Keys, Discussion Topics, Enrollments, Enrollment Terms, ePortfolios, ePub Exports,
    External Tools, Favorites, Feature Flags, Files, Folders, Gradebook History, Grading Periods,
    Grading Standards, Group Categories, Groups, JWTs, Late Policy, Live Assessments, Logins, Media
    Objects, Modules, New Quizzes, Notification Preferences, Outcomes, Outcome Groups, Outcome Imports,
    Outcome Results, Pages, Peer Reviews, Planner, Polls, Progress, Quizzes, Quiz Submissions, Roles,
    Rubrics, Sections, SIS Imports, Sub-Accounts, Submissions, Submission Comments, Tabs, User
    Observees, Users, AI Conversations, AI Experiences, and more. Authentication via OAuth2 (RFC 6749)
    with developer-key-issued client credentials; supports manual access tokens for testing and
    masquerading via the as_user_id parameter.
