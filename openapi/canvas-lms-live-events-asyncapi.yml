  schemas:
    Metadata:
      type: object
      title: Metadata
      description: Metadata included in each event. Exact fields vary by event type and whether the event is system- or user-
        generated.
      required:
      - event_name
      - event_time
      - producer
      - root_account_id
      - root_account_uuid
      properties:
        client_ip:
          type: string
          description: The client IP address of the request that triggered the event. Only present in user-generated events.
        context_account_id:
          type: string
          description: The account id of the current context. This is the actual account the context is attached to.
        context_id:
          type: string
          description: The Canvas id of the current context.
        context_role:
          type: string
          description: The role of the current user in the current context.
        context_sis_source_id:
          type: string
          description: SIS source id of the current context.
        context_type:
          type: string
          description: The type of context where the event happened.
        developer_key_id:
          type: string
          description: The id of the Developer Key used to create the access token for user. Only available for events triggered
            by an external tool.
        event_name:
          type: string
          description: The event type.
        event_time:
          type: string
          format: date-time
          description: The time that Canvas emitted the event, in ISO 8601 format with millisecond precision.
        hostname:
          type: string
          description: The domain of the Canvas instance for the request. Only present in user-generated events.
        http_method:
          type: string
          description: HTTP method/verb (GET, PUT, POST etc.) that the request was sent with. Only present in user-generated
            events.
        job_id:
          type: string
          description: The identifier for the asynchronous job. Only present in system-generated events (events emitted in
            an asynchronous job, not an HTTP request).
        job_tag:
          type: string
          description: A string identifying the type of job being performed. Only present in system-generated events (events
            emitted in an asynchronous job, not an HTTP request).
        producer:
          type: string
          description: Always "canvas".
        real_user_id:
          type: string
          description: If the current user is being masqueraded, this is the Canvas id of the masquerading user. Only present
            in user-generated events.
        referrer:
          type: string
          description: URL of the page the user clicked to get to the current page. Only present in user-generated events.
        request_id:
          type: string
          description: The identifier for this request. Correlates to Canvas Data table Requests.id. Only present in user-generated
            events.
        root_account_id:
          type: string
          description: The Canvas id of the root account associated with the context of the job.
        root_account_lti_guid:
          type: string
          description: The Canvas lti_guid of the root account associated with the context of the job.
        root_account_uuid:
          type: string
          description: The Canvas uuid of the root account associated with the context of the job.
        session_id:
          type: string
          description: The session identifier for this request. Can be used to correlate events in the same session for a
            user. Only present in user-generated events.
        time_zone:
          type: string
          description: Time zone of the currently logged in user. Only present in user-generated events (events emitted directly
            from an HTTP request).
        url:
          type: string
          description: The URL of the request that triggered the event. Only present in user-generated events.
        user_account_id:
          type: string
          description: The Canvas id of the account that the current user belongs to. Only present in user-generated events
            (events emitted directly from an HTTP request).
        user_agent:
          type: string
          description: The User-Agent sent by the browser making the request. Only present in user-generated events.
        user_id:
          type: string
          description: The Canvas id of the currently logged in user.
        user_login:
          type: string
          description: The login of the current user. Only present in user-generated events (events emitted directly from
            an HTTP request).
        user_sis_id:
          type: string
          description: The SIS id of the user. Only present in user-generated events (events emitted directly from an HTTP
            request).
    AccountCreatedEventPayload:
      type: object
      title: AccountCreated
      description: The event is emitted anytime an account is created by an end user or API request.
      required:
      - metadata
      - body
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        body:
          type: object
          description: Body payload for the account_created Live Event.
          properties:
            account_id:
              type: string
              description: The Canvas id of the account.
            default_locale:
              type: string
              description: The default locale of the account.
            default_time_zone:
              type: string
              format: date-time
              description: The default time zone of the account.
            domain:
              type: string
              description: The Canvas domain of the root account of the account.
            external_status:
              type: string
              description: The external status of the account.
            name:
              type: string
              description: The name of the account.
            parent_account_id:
              type: string
              description: The id of the Canvas parent account of the created account.
            root_account_id:
              type: string
              description: The id of the Canvas root account the created account belongs to.
            root_account_uuid:
              type: string
              description: The uuid of the Canvas root account the created account belongs to.
            workflow_state:
              type: string
              description: The workflow state of the account.
    AccountNotificationCreatedEventPayload:
      type: object
      title: AccountNotificationCreated
      description: The event is emitted anytime an account level notification is created by and end user or API request.
      required:
      - metadata
      - body
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        body:
          type: object
          description: Body payload for the account_notification_created Live Event.
          properties:
            account_notification_id:
              type: string
              description: The Canvas id of the account notification.
            end_at:
              type: string
              format: date-time
              description: When to expire the notification.
            icon:
              type: string
              description: The icon to display with the message.  Defaults to warning.
            message:
              type: string
              description: 'The message to be sent in the notification. NOTE: This field will be truncated to only include
                the first 8192 characters.'
            start_at:
              type: string
              format: date-time
              description: When to send out the notification.
            subject:
              type: string
              description: 'The subject of the notification. NOTE: This field will be truncated to only include the first
                8192 characters.'
    AccountUpdatedEventPayload:
      type: object
      title: AccountUpdated
      description: The event is emitted anytime an account is updated by an end user or API request.
      required:
      - metadata
      - body
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        body:
          type: object
          description: Body payload for the account_updated Live Event.
          properties:
            account_id:
              type: string
              description: The Canvas id of the account.
            default_locale:
              type: string
              description: The default locale of the account.
            default_time_zone:
              type: string
              format: date-time
              description: The default time zone of the account.
            domain:
              type: string
              description: The Canvas domain of the root account of the account.
            external_status:
              type: string
              description: The external status of the account.
            name:
              type: string
              description: The name of the account.
            parent_account_id:
              type: string
              description: The id of the Canvas parent account of the created account.
            root_account_id:
              type: string
              description: The id of the Canvas root account the created account belongs to.
            root_account_uuid:
              type: string
              description: The uuid of the Canvas root account the created account belongs to.
            workflow_state:
              type: string
              description: The workflow state of the account.
    AssetAccessedEventPayload:
      type: object
      title: AssetAccessed
      description: '`asset_accessed` events are triggered for viewing various objects in Canvas. Viewing a quiz, a wiki page,
        the list of quizzes, etc, all generate `asset_access` events. The item being accessed is identified by `asset_type`,
        `asset_id`, and `asset_subtype`. If `asset_subtype` is set, then it refers to a list of items in the asset. For example,
        if `asset_type` is `course`, and `asset_subtype` is `quizzes`, then this is referring to viewing the list of quizzes
        in the course.


        If `asset_subtype` is not set, then the access is on the asset described by `asset_type` and `asset_id`.'
      required:
      - metadata
      - body
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        body:
          type: object
          description: Body payload for the asset_accessed Live Event.
          properties:
            asset_id:
              type: string
              description: The Canvas id of the asset.
            asset_name:
              type: string
              description: The title of a course, page, module, assignment, LTI, attachment etc.
            asset_subtype:
              type: string
              description: The sub type of asset being accessed.
            asset_type:
              type: string
              description: The type of asset being accessed.
            category:
              type: string
              description: A categorized list of values based on the asset or asset subtype accessed. (announcements, assignments,
                calendar, collaborations, conferences, external_tools, external_urls, files, grades, home, modules, outcomes,
                pages, quizzes, roster, syllabus, topics, wiki)
            display_name:
              type: string
              description: The display name of the attachment, possibly truncated.
            domain:
              type: string
              description: The domain of the LTI tool, when subtype is context_external_tool.
            filename:
              type: string
              description: The file name of the attachment, possibly truncated.
            level:
              type: string
              description: Usually null, can be used to indicate a deeper level of access. Can be "submit" for assignments.
                Can be "participate" for collaboration, calendar, discussion_topic (user posts to topic), quizzes:quiz, web_conference,
                or wiki_page (page created or edited).
            role:
              type: string
              description: The role of the user accessing the asset. (AccountUser, DesignerEnrollment, GroupMembership, ObserverEnrollment,
                StudentEnrollment, StudentViewEnrollment, TaEnrollment, TeacherEnrollment, User)
            url:
              type: string
              description: The URL of the LTI tool, when subtype is context_external_tool.
    AssignmentCreatedEventPayload:
      type: object
      title: AssignmentCreated
      description: The event is emitted anytime a new assignment is created by an end user or API request.
      required:
      - metadata
      - body
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        body:
          type: object
          description: Body payload for the assignment_created Live Event.
          properties:
            assignment_group_id:
              type: string
              description: The Canvas id of the assignment group.
            assignment_id:
              type: string
              description: The Canvas id of the new assignment.
            assignment_id_duplicated__from:
              type: string
              description: The Canvas id of the original assignment.  Present if new assigment is a copy.
            context_id:
              type: string
              description: The type of context the assignment is used in.
            context_type:
              type: string
              description: The type of context the assignment is used in.
            context_uuid:
              type: string
              description: The uuid of the context associated with the assignment.
            created_on_blueprint_sync:
              type: boolean
              description: Whether or not the assignment was created in the context of a blueprint sync.
            description:
              type: string
              description: 'The description of the assignment. NOTE: This field will be truncated to only include the first
                8192 characters.'
            domain:
              type: string
              description: The Canvas domain of the root account of the assignment.
            domain_duplicated_from:
              type: string
              description: The Canvas domain of the root account of the original assignment. Present if new assigment is a
                copy.
            due_at:
              type: string
              format: date-time
              description: The due date for the assignment.
            lock_at:
              type: string
              format: date-time
              description: The lock date (assignment is locked after this date).
            lti_assignment_id:
              type: string
              description: The LTI assignment guid for the assignment.
            lti_resource_link_id:
              type: string
              description: The unique identifier of the assignment resource in the LTI specification. Unique per Canvas shard.
            lti_resource_link_id_duplicated_from:
              type: string
              description: The LTI resource link ID of the original assignment. Present if new assigment is a copy.
            points_possible:
              type: number
              description: The maximum points possible for the assignment.
            submission_types:
              type: array
              items:
