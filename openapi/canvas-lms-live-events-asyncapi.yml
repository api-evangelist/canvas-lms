    LearningOutcomeResultCreatedEventPayload:
      type: object
      title: LearningOutcomeResultCreated
      description: 'The event is emitted anytime a submission is assessed against an outcome. The following setup should be
        enabled in Canvas in order for the event to be triggered:

        1. Administrator has set up learning outcomes at the account/sub-account level

        2. Instructor has added outcome to assignment rubric

        3. Student submitted a rubric based assignment

        4. Instructor graded a rubric based assignment at the outcome level => there is a result associated with assignment
        outcome'
      required:
      - metadata
      - body
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        body:
          type: object
          description: Body payload for the learning_outcome_result_created Live Event.
          properties:
            artifact_created_at:
              type: string
              format: date-time
              description: The date when the artifact was created or nil.
            artifact_id:
              type: string
              description: The id of the artifact that contains the outcome assessment. Value will be an string representation
                of an integer or nil.
            artifact_type:
              type: string
              description: 'The type of artifact that contains the outcome assessment.  Value will be one of the following:
                RubricAssessment, Submission, Quizzes::QuizSubmission, LiveAssessments::Submission or nil.'
            artifact_updated_at:
              type: string
              format: date-time
              description: The date when the artifact was last updated or nil.
            assessed_at:
              type: string
              format: date-time
              description: The date when the outcome was last assessed.
            associated_asset_id:
              type: string
              description: The id of the asset that the outcome is aligned to. Value will be an string representation of an
                integer or nil.
            associated_asset_type:
              type: string
              description: 'The type of the asset that the outcome is aligned to. Value will be one of the following: AssessmentQuestion,
                Assignment, Quizzes::Quiz, LiveAssessments::Assessment or nil.'
            attempt:
              type: integer
              description: The submission attempt number.
            created_at:
              type: string
              format: date-time
              description: Time when the result was created.
            id:
              type: string
              description: The local Canvas ID of the learning outcome result.
            learning_outcome_context_uuid:
              type: string
              description: The uuid of the context associated with the learning outcome.
            learning_outcome_id:
              type: string
              description: The local Canvas ID of the learning outcome.
            mastery:
              type: string
              description: True if student achieved mastery.
            original_mastery:
              type: string
              description: True if student achieved mastery on the first attempt.
            original_possible:
              type: string
              description: Possible points on the first attempt.
            original_score:
              type: string
              description: Score on the first attempt.
            percent:
              type: string
              description: Percent of maximum points possible for an outcome, scaled to reflect any custom mastery levels
                that differ from the learning outcome.
            possible:
              type: number
              description: Total number of points possible.
            result_context_id:
              type: string
              description: The local Canvas ID of the context associated with the learning outcome result.
            result_context_type:
              type: string
              description: 'The type of the context associated with the learning outcome result. Value will be one of the
                following: Account or Course.'
            result_context_uuid:
              type: string
              description: The uuid of the context associated with the learning outcome result.
            score:
              type: number
              description: The student's score.
            user_uuid:
              type: string
              description: The unique identifier for the user that the outcome was assessed.
