  securitySchemes:
    jwtSignature:
      type: httpApiKey
      description: When the HTTPS subscription has 'Sign Payload' enabled, the POST body is a JWT signed by Canvas. Verify
        with the JWKs at https://8axpcl50e4.execute-api.us-east-1.amazonaws.com/main/jwks. Match the JWT header `kid` to one
        of the JWKs (previous/current/next) returned by that endpoint.
      name: Authorization
      in: header
    awsSigV4:
      type: userPassword
      description: AWS SQS delivery may optionally use an IAM access key and secret (with region) configured on the Canvas
        subscription. Otherwise queue access is granted via SQS queue policy allowing principal 636161780776.
