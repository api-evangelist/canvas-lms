    RubricAssessedEventPayload:
      type: object
      title: RubricAssessed
      description: The event is emitted anytime a rubric is assessed that is aligned to an active rubric association.
      required:
      - metadata
      - body
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        body:
          type: object
          description: Body payload for the rubric_assessed Live Event.
          properties:
            aligned_to_outcomes:
              type: boolean
              description: Boolean value that indicates if the rubric is aligned with learning outcomes. values will be true
                if the rubric is aligned to learning outcomes or false if the rubric is not aligned to learning outcomes.
            artifact_id:
              type: string
              description: The ID of the artifact object aligned to the Rubric Assessment object.
            artifact_type:
              type: string
              description: The type of the artifact object aligned to the Rubric Assessment object. Values will be either
                'Submission', 'ModeratedGrading::ProvisionalGrade', or 'Assignment'.
            assessment_type:
              type: string
              description: The type of assessment. Values will be either 'grading', 'peer_review', or 'provisional_grade'.
            attempt:
              type: integer
              description: The integer representation of the number of attempts made by the student on the rubric aligned
                Artifact. The value will be nil if the Artifact aligned is not a Submission or if the assignment has yet to
                be submitted by the student.
            context_uuid:
              type: string
              description: The unique id of the Context object associated with the Rubric Association object. If this value
                is not present on the context, it will not be present in the live event body.
            created_at:
              type: string
              format: date-time
              description: The date and time the initial rubric assessment was created.
            id:
              type: string
              description: The ID of the Rubric Assessment object.
            submitted_at:
              type: string
              format: date-time
              description: The date and time the student submitted the assignment that the rubric is aligned to or the date
                time the instructor assessed the rubric.
            updated_at:
              type: string
              format: date-time
              description: The date and time the rubric assessment was updated.
