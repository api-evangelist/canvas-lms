    GradeChangeEventPayload:
      type: object
      title: GradeChange
      description: The event is emitted anytime when a submission is graded. These can happen as the result of a teacher changing
        a grade in the gradebook or speedgrader, a quiz being automatically scored, or changing an assignment's points possible
        or grade type. In the case of a quiz being scored, the `grade_change` event will be emitted as the result of a student
        turning in a quiz, and the `user_id` in the message attributes will be the student's user ID.
      required:
      - metadata
      - body
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        body:
          type: object
          description: Body payload for the grade_change Live Event.
          properties:
            assignment_id:
              type: string
              description: The Canvas id of the assignment associated with the submission.
            grade:
              type: string
              description: The new grade.
            grader_id:
              type: string
              description: The Canvas id of the user making the grade change. Null if this was the result of automatic grading.
            grading_complete:
              type: boolean
              description: The boolean state that the submission is completely graded.  False if the assignment is only partially
                graded, for example a quiz with automatically and manuall...
            muted:
              type: boolean
              description: The boolean muted state of the submissions's assignment.  Muted grade changes should not be published
                to students.
            old_grade:
              type: string
              description: The previous grade, if there was one.
            old_points_possible:
              type: number
              description: The maximum points possible for the previous grade.
            old_score:
              type: number
              description: The previous score.
            points_possible:
              type: number
              description: The maximum points possible for the submission's assignment.
            score:
              type: number
              description: The new score.
            student_id:
              type: string
              description: Same as the user_id.
            student_sis_id:
              type: string
              description: The SIS ID of the student.
            submission_id:
              type: string
              description: The Canvas id of the submission that the grade is changing on.
            user_id:
              type: string
              description: The Canvas id of the user associated with the submission with the change.
